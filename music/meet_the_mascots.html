<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Melody and Barnaby</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght=500;700&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle, #fef3c7 0%, #bae6fd 100%);
            min-height: 100vh;
        }
        .kids-title { font-family: 'Fredoka One', cursive; }
        .mascot-bounce { animation: idle-bounce 2s ease-in-out infinite alternate; }
        @keyframes idle-bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
        .slide-dot { width: 9px; height: 9px; border-radius: 50%; background: #e2e8f0; transition: background 0.2s ease, transform 0.2s ease; }
        .slide-dot.active { background: #f59e0b; transform: scale(1.2); }
        button { touch-action: manipulation; }
    </style>
</head>
<body class="py-2 px-4 flex items-center justify-center">

    <div id="game-card" class="max-w-xl w-full bg-white rounded-3xl shadow-2xl border-4 border-amber-400 p-6 relative overflow-hidden text-center">

        <h1 class="kids-title text-3xl text-amber-600 mb-1">Meet Your Music Friends!</h1>

        <div id="mascot-row" class="flex items-center justify-center gap-6 my-6" style="min-height: 120px;"></div>

        <div class="relative bg-amber-50 border border-amber-100 p-4 rounded-2xl shadow-sm mb-5">
            <p id="slide-text" class="text-slate-700 font-bold text-base leading-relaxed"></p>
        </div>

        <div id="slide-dots" class="flex items-center justify-center gap-2 mb-5"></div>

        <button id="next-btn" onclick="nextSlide()" class="bg-amber-400 text-slate-800 font-extrabold px-10 py-3 rounded-full border-b-4 border-amber-600 hover:brightness-105 active:scale-95 transition-all text-lg">
            Next
        </button>

    </div>

    <script>
        const SVG_MELODY = `
        <svg viewBox="0 0 100 100" class="w-20 h-20 drop-shadow-md">
            <circle cx="50" cy="50" r="35" fill="#2dd4bf" />
            <path d="M 15,50 A 35,35 0 0,0 50,85 Z" fill="#0d9488" />
            <ellipse cx="40" cy="62" rx="15" ry="12" fill="#ccfbf1" />
            <circle cx="65" cy="40" r="7" fill="#ffffff" />
            <circle cx="67" cy="40" r="3.5" fill="#0f172a" />
            <circle cx="69" cy="38" r="1.5" fill="#ffffff" />
            <polygon points="75,45 90,48 78,55" fill="#fb923c" stroke="#ea580c" stroke-width="1.5" stroke-linejoin="round" />
            <path d="M 25,50 C 20,40 35,35 45,50 C 40,60 30,60 25,50 Z" fill="#14b8a6" />
            <path d="M 40,18 Q 30,8 42,12 Q 54,8 44,18" fill="#2dd4bf" />
        </svg>`;

        const SVG_BARNABY = `
        <svg viewBox="0 0 100 100" class="w-20 h-20 drop-shadow-md">
            <circle cx="25" cy="25" r="12" fill="#818cf8" />
            <circle cx="25" cy="25" r="7" fill="#c7d2fe" />
            <circle cx="75" cy="25" r="12" fill="#818cf8" />
            <circle cx="75" cy="25" r="7" fill="#c7d2fe" />
            <circle cx="50" cy="55" r="32" fill="#6366f1" />
            <circle cx="30" cy="62" r="5" fill="#f472b6" opacity="0.6" />
            <circle cx="70" cy="62" r="5" fill="#f472b6" opacity="0.6" />
            <ellipse cx="50" cy="68" rx="16" ry="11" fill="#e0e7ff" />
            <polygon points="46,63 54,63 50,68" fill="#1e1b4b" stroke="#1e1b4b" stroke-width="1" stroke-linejoin="round" />
            <path d="M 32,48 Q 40,40 42,48" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round" />
            <path d="M 58,48 Q 60,40 68,48" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round" />
        </svg>`;

        const SLIDES = [
            {
                mascots: [SVG_MELODY],
                text: "Hi! I'm Melody 🐦 — I live on the treble clef, up at the top of the music. I love HIGH sounds!"
            },
            {
                mascots: [SVG_BARNABY],
                text: "And I'm Barnaby 🐻 — I live down on the bass clef. That's where all the LOW, rumbly sounds live!"
            },
            {
                mascots: [SVG_MELODY, SVG_BARNABY],
                text: "Together we'll be right there in every game, cheering you on and helping you learn to read music!"
            },
            {
                mascots: [SVG_MELODY, SVG_BARNABY],
                text: "Ready to start? Let's go and play!"
            }
        ];

        let slideIndex = 0;

        function renderSlide() {
            const slide = SLIDES[slideIndex];
            document.getElementById('mascot-row').innerHTML = slide.mascots
                .map(svg => `<div class="mascot-bounce">${svg}</div>`)
                .join('');
            document.getElementById('slide-text').innerText = slide.text;

            const dots = document.getElementById('slide-dots');
            dots.innerHTML = SLIDES.map((_, i) => `<div class="slide-dot${i === slideIndex ? ' active' : ''}"></div>`).join('');

            const nextBtn = document.getElementById('next-btn');
            if (slideIndex === SLIDES.length - 1) {
                nextBtn.innerText = "Let's go!";
            } else {
                nextBtn.innerText = "Next";
            }
        }

        function nextSlide() {
            if (slideIndex >= SLIDES.length - 1) {
                window.location.href = '../index.html';
                return;
            }
            slideIndex++;
            renderSlide();
        }

        renderSlide();
    </script>
</body>
</html>
