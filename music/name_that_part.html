<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name That Part</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght=500;700&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle, #ffe4e6 0%, #fed7aa 100%);
            min-height: 100vh;
        }
        .kids-title {
            font-family: 'Fredoka One', cursive;
        }
        .mascot-bounce { animation: idle-bounce 2s ease-in-out infinite alternate; }
        @keyframes idle-bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-8px); } }
        .mascot-spin { animation: happy-spin 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1; }
        @keyframes happy-spin { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.3); } 100% { transform: rotate(360deg) scale(1); } }
        .mascot-sad { animation: sad-shake 0.5s ease-in-out 1; }
        @keyframes sad-shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px) rotate(-5deg); } 40%, 80% { transform: translateX(10px) rotate(5deg); } }
        .confetti { position: absolute; pointer-events: none; width: 12px; height: 12px; border-radius: 50%; animation: blow-up 1s ease-out forwards; }
        @keyframes blow-up { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; } }
        button { touch-action: manipulation; }
    </style>
</head>
<body class="py-2 px-4 flex items-center justify-center">

    <div id="game-card" class="max-w-xl w-full bg-white rounded-3xl shadow-2xl border-4 border-rose-400 p-4 relative overflow-hidden">

        <div class="flex justify-between items-center mb-2">
            <div class="flex gap-2">
                <span class="bg-yellow-100 text-yellow-800 px-3 py-1.5 rounded-full font-bold text-sm shadow-sm flex items-center gap-1">
                    ⭐ Score: <span id="score">0</span>
                </span>
                <span class="bg-orange-100 text-orange-800 px-3 py-1.5 rounded-full font-bold text-sm shadow-sm flex items-center gap-1">
                    🔥 Streak: <span id="streak">0</span>
                </span>
            </div>
            <div class="flex items-center gap-1 text-2xl" id="hearts-container">❤️❤️❤️</div>
        </div>

        <h1 class="kids-title text-3xl text-rose-600 text-center mb-1">Name That Part</h1>
        <p class="text-slate-500 text-center text-sm font-semibold mb-3">What kind of note is this?</p>

        <div class="grid grid-cols-3 gap-2 bg-rose-50 p-2 rounded-2xl mb-2 border border-rose-100">
            <button id="btn-stage-1" onclick="setStage(1)" class="py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-rose-400 text-white border-b-2 border-rose-600 shadow">
                ☀️ Stage 1: Easy
            </button>
            <button id="btn-stage-2" onclick="setStage(2)" class="py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-slate-100 text-slate-600 hover:bg-slate-200">
                🌴 Stage 2: Medium
            </button>
            <button id="btn-stage-3" onclick="setStage(3)" class="py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-slate-100 text-slate-600 hover:bg-slate-200">
                🚀 Stage 3: Hard
            </button>
        </div>

        <div class="flex items-center gap-3 bg-rose-50 p-2 rounded-2xl border border-rose-100 mb-2">
            <div id="mascot-avatar" class="mascot-bounce shrink-0 transition-transform"></div>
            <div class="relative bg-white border border-rose-100 p-2 rounded-xl shadow-sm w-full">
                <div class="absolute top-1/2 -left-2 w-4 h-4 -translate-y-1/2 rotate-45 bg-white border-l border-b border-rose-50"></div>
                <p id="mascot-dialog" class="text-slate-700 font-bold text-sm leading-snug">
                    Hi, I'm Melody! Can you name how long this note lasts?
                </p>
            </div>
        </div>

        <div class="relative bg-slate-50 rounded-2xl p-2 border-2 border-slate-200 mb-2 flex justify-center items-center">
            <canvas id="canvas" width="300" height="170" class="max-h-40 w-auto rounded-xl bg-white shadow-inner"></canvas>
            <div id="confetti-holder" class="absolute inset-0 pointer-events-none overflow-hidden rounded-2xl"></div>

            <div id="overlay" class="absolute inset-0 bg-white/95 backdrop-blur-sm rounded-2xl flex flex-col justify-center items-center p-6 text-center hidden transition-opacity duration-300 z-50">
                <div id="overlay-mascot" class="mb-3 mascot-bounce"></div>
                <h3 id="overlay-title" class="kids-title text-3xl text-rose-600 mb-2">Stage Passed!</h3>
                <p id="overlay-msg" class="text-slate-600 font-bold mb-4">Incredible job!</p>
                <button id="overlay-btn" onclick="dismissOverlay()" class="bg-yellow-400 text-slate-800 font-extrabold px-8 py-3 rounded-full border-b-4 border-yellow-600 hover:brightness-105 active:scale-95 transition-all text-lg">
                    Next Challenge!
                </button>
            </div>
        </div>

        <div id="question-text" class="text-center text-lg font-black text-slate-800 mb-2">
            What note is this?
        </div>

        <div id="feedback" class="text-center text-base font-bold min-h-[24px] text-slate-700 mb-2">
            &nbsp;
        </div>

        <div class="grid grid-cols-1 gap-2 mb-3" id="answer-buttons">
            <!-- injected -->
        </div>

        <div class="flex justify-between items-center text-xs">
            <button onclick="toggleHints()" class="bg-purple-100 text-purple-700 border-b-2 border-purple-300 font-bold px-4 py-2 rounded-xl hover:bg-purple-200">
                💡 <span id="hint-btn-text">Turn Hints On</span>
            </button>
            <button onclick="resetGame()" class="bg-rose-100 text-rose-700 border-b-2 border-rose-300 font-bold px-4 py-2 rounded-xl hover:bg-rose-200">
                🔄 Reset Score
            </button>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
    <script src="reward-system.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let currentStage = 1;
        let score = 0;
        let streak = 0;
        let lives = 3;
        let hintsEnabled = false;
        let controlLock = false;

        // Note duration types this nugget teaches, with both naming systems
        // shown together (Andrew wants both taught, not one or the other).
        const NOTE_TYPES = {
            crotchet: { label: 'Crotchet', altLabel: 'Quarter Note', filled: true, stem: true },
            minim: { label: 'Minim', altLabel: 'Half Note', filled: false, stem: true },
            semibreve: { label: 'Semibreve', altLabel: 'Whole Note', filled: false, stem: false }
        };
        const STAGE_TYPES = {
            1: ['crotchet', 'minim'],
            2: ['crotchet', 'minim', 'semibreve'],
            3: ['crotchet', 'minim', 'semibreve']
        };

        let currentType = null;
        let correctAnswer = null;

        const dialogs = {
            start: "Hi, I'm Melody! Can you name how long this note lasts?",
            correct: "Spot on! 🎯",
            incorrect: "Not quite — look at the note head and stem again."
        };

        let audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }
        function playTone(freq, type = 'triangle', duration = 0.5) {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch (e) {}
        }
        function playSuccessArpeggio() {
            try {
                const ctx = getAudioContext();
                const now = ctx.currentTime;
                [261.63, 329.63, 392.00, 523.25].forEach((freq, idx) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + idx * 0.08);
                    gain.gain.setValueAtTime(0.15, now + idx * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.08 + 0.25);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now + idx * 0.08);
                    osc.stop(now + idx * 0.08 + 0.25);
                });
            } catch (e) {}
        }
        function playFailBuzz() { playTone(110, 'sawtooth', 0.35); }

        const SVG_MELODY = `
        <svg viewBox="0 0 100 100" class="w-16 h-16 drop-shadow-md">
            <circle cx="50" cy="50" r="35" fill="#2dd4bf" />
            <path d="M 15,50 A 35,35 0 0,0 50,85 Z" fill="#0d9488" />
            <ellipse cx="40" cy="62" rx="15" ry="12" fill="#ccfbf1" />
            <circle cx="65" cy="40" r="7" fill="#ffffff" />
            <circle cx="67" cy="40" r="3.5" fill="#0f172a" />
            <circle cx="69" cy="38" r="1.5" fill="#ffffff" />
            <polygon points="75,45 90,48 78,55" fill="#fb923c" stroke="#ea580c" stroke-width="1.5" stroke-linejoin="round" />
            <path d="M 25,50 C 20,40 35,35 45,50 C 40,60 30,60 25,50 Z" fill="#14b8a6" />
            <path d="M 40,18 Q 30,8 42,12 Q 54,8 44,18" fill="#2dd4bf" />
        </svg>`;

        function setStage(stageNum) {
            currentStage = stageNum;
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`btn-stage-${i}`);
                if (i === stageNum) {
                    btn.className = "py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-rose-400 text-white border-b-2 border-rose-600 shadow";
                } else {
                    btn.className = "py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-slate-100 text-slate-600 hover:bg-slate-200";
                }
            }
            resetStats();
            newRound();
        }

        function newRound() {
            const types = STAGE_TYPES[currentStage];
            currentType = types[Math.floor(Math.random() * types.length)];
            correctAnswer = currentType;
            controlLock = false;

            drawNoteQuestion(currentType);
            renderAnswers();

            document.getElementById('mascot-dialog').innerText = dialogs.start;
            const feedback = document.getElementById('feedback');
            feedback.className = "text-center text-base font-bold min-h-[24px] text-slate-700 mb-2";
            feedback.innerHTML = "&nbsp;";
        }

        function drawNoteQuestion(type) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const staffTop = 50, lineGap = 16, width = 220, startX = 40;

            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 2.5;
            for (let i = 0; i < 5; i++) {
                const y = staffTop + i * lineGap;
                ctx.beginPath();
                ctx.moveTo(startX, y);
                ctx.lineTo(startX + width, y);
                ctx.stroke();
            }

            ctx.textBaseline = 'alphabetic';
            ctx.textAlign = 'left';
            ctx.fillStyle = '#1e293b';
            ctx.font = `${lineGap * 4}px "Noto Music", serif`;
            ctx.fillText("\u{1D11E}", startX + 10, staffTop + 4 * lineGap);

            // Fixed on the middle line every round — pitch never changes here,
            // only duration, so that's the only thing being tested.
            drawDurationNote(startX + width / 2 + 20, staffTop + 2 * lineGap, type);
        }

        function drawDurationNote(x, y, type) {
            const def = NOTE_TYPES[type];
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(-0.2);
            ctx.beginPath();
            ctx.ellipse(0, 0, 11, 8, 0, 0, 2 * Math.PI);
            if (def.filled) {
                ctx.fillStyle = '#2563eb';
                ctx.fill();
            } else {
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.strokeStyle = '#2563eb';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            ctx.restore();

            if (def.stem) {
                ctx.strokeStyle = '#2563eb';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(x + 10, y);
                ctx.lineTo(x + 10, y - 40);
                ctx.stroke();
            }
        }

        function renderAnswers() {
            const container = document.getElementById('answer-buttons');
            container.innerHTML = '';

            const keys = [...STAGE_TYPES[currentStage]];
            for (let i = keys.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [keys[i], keys[j]] = [keys[j], keys[i]];
            }

            keys.forEach(key => {
                const def = NOTE_TYPES[key];
                const btn = document.createElement('button');
                btn.innerText = `${def.label} (${def.altLabel})`;
                btn.className = "bg-gradient-to-b from-rose-400 to-rose-500 hover:from-rose-500 hover:to-rose-600 text-white font-bold text-base py-4 rounded-2xl border-b-4 border-rose-700 active:translate-y-0.5 active:border-b-2 transition-all shadow-md";
                btn.onclick = () => makeGuess(key);
                container.appendChild(btn);
            });

            if (hintsEnabled) {
                const hint = document.createElement('div');
                hint.className = "text-center text-xs font-bold text-purple-600 bg-purple-50 rounded-xl py-1 mt-1";
                const def = NOTE_TYPES[correctAnswer];
                hint.innerText = `Answer: ${def.label} (${def.altLabel})`;
                container.appendChild(hint);
            }
        }

        function makeGuess(answer) {
            if (controlLock) return;
            const feedback = document.getElementById('feedback');

            if (answer === correctAnswer) {
                score += 10;
                streak++;
                Tracking.logAnswer({ correct: true, stage: currentStage });
                RewardSystem.correct();
                document.getElementById('score').innerText = score;
                document.getElementById('streak').innerText = streak;

                feedback.className = "text-center text-base font-bold text-green-600 mb-2";
                feedback.innerText = "⭐ Spot on! ⭐";

                playTone(523.25, 'triangle', 0.4);
                triggerConfetti();
                document.getElementById('mascot-dialog').innerText = dialogs.correct;
                controlLock = true;

                if (streak > 0 && streak % 10 === 0) {
                    setTimeout(triggerStageComplete, 900);
                } else {
                    setTimeout(newRound, 1100);
                }
            } else {
                streak = 0;
                lives--;
                Tracking.logAnswer({ correct: false, stage: currentStage });
                document.getElementById('streak').innerText = streak;
                updateHearts();

                feedback.className = "text-center text-base font-bold text-rose-500 mb-2";
                feedback.innerText = "Not quite — look at the note head and stem again.";

                playFailBuzz();
                document.getElementById('mascot-dialog').innerText = dialogs.incorrect;

                controlLock = true;
                setTimeout(() => { controlLock = false; }, 700);

                if (lives <= 0) {
                    setTimeout(triggerGameOver, 900);
                }
            }
        }

        function triggerConfetti() {
            const holder = document.getElementById('confetti-holder');
            const colors = ['#f43f5e', '#3b82f6', '#10b981', '#eab308', '#a855f7', '#ff7849'];
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'confetti';
                const angle = Math.random() * Math.PI * 2;
                const distance = 80 + Math.random() * 120;
                particle.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
                particle.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = '50%';
                particle.style.top = '50%';
                holder.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        function updateHearts() {
            const container = document.getElementById('hearts-container');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) container.innerHTML += i < lives ? '❤️' : '🖤';
        }

        function triggerStageComplete() {
            playSuccessArpeggio();
            const overlay = document.getElementById('overlay');
            document.getElementById('overlay-mascot').innerHTML = SVG_MELODY;
            document.getElementById('overlay-title').innerText = "🌟 Sensational! 🌟";
            const oMsg = document.getElementById('overlay-msg');
            const oBtn = document.getElementById('overlay-btn');

            if (currentStage < 3) {
                oMsg.innerText = `You completed Stage ${currentStage}! Ready for Stage ${currentStage + 1}?`;
                oBtn.innerText = "Go to Next Stage!";
                oBtn.onclick = () => { dismissOverlay(); setStage(currentStage + 1); };
            } else {
                oMsg.innerText = `Amazing! You know your note values!`;
                oBtn.innerText = "Play Again!";
                oBtn.onclick = () => { dismissOverlay(); resetGame(); };
            }
            overlay.classList.remove('hidden');
        }

        function triggerGameOver() {
            const overlay = document.getElementById('overlay');
            document.getElementById('overlay-mascot').innerHTML = SVG_MELODY;
            document.getElementById('overlay-title').innerText = "No More Hearts!";
            document.getElementById('overlay-msg').innerText = "Let's take another look and try this stage again!";
            const oBtn = document.getElementById('overlay-btn');
            oBtn.innerText = "Restart Stage";
            oBtn.onclick = () => { dismissOverlay(); resetStats(); newRound(); };
            overlay.classList.remove('hidden');
        }

        function dismissOverlay() {
            document.getElementById('overlay').classList.add('hidden');
            controlLock = false;
        }

        function resetStats() {
            streak = 0;
            lives = 3;
            document.getElementById('streak').innerText = streak;
            updateHearts();
        }

        function resetGame() {
            score = 0;
            document.getElementById('score').innerText = score;
            setStage(1);
        }

        function toggleHints() {
            hintsEnabled = !hintsEnabled;
            document.getElementById('hint-btn-text').innerText = hintsEnabled ? "Turn Hints Off" : "Turn Hints On";
            renderAnswers();
        }

        window.onload = async () => {
            try {
                const notoMusicFont = new FontFace(
                    'Noto Music',
                    'url(https://fonts.gstatic.com/s/notomusic/v21/pe0rMIiSN5pO63htf1sxEkW7I9tAcVwob5A.woff2)'
                );
                document.fonts.add(notoMusicFont);
                await notoMusicFont.load();
            } catch (e) {
                console.warn('Noto Music font failed to load; clef will use fallback serif glyph.', e);
            }
            document.getElementById('mascot-avatar').innerHTML = SVG_MELODY;
            setStage(1);
        };
    </script>
</body>
</html>
